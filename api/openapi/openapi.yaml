openapi: 3.0.3
info:
  title: SRTP Backend API
  version: 0.2.0
servers:
  - url: /
paths:
  /auth/wx/login:
    post:
      operationId: loginWithWechat
      summary: Login with wx.login code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WxLoginRequest'
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      operationId: logoutCurrentUser
      summary: Logout current user
      responses:
        '204':
          description: Logged out
  /healthz:
    get:
      operationId: getHealthz
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      operationId: getReadyz
      summary: Service readiness check
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: createUser
      summary: Create a user record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get a user by id
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/profile:
    put:
      operationId: updateCurrentUserProfile
      summary: Update current user profile with synchronous blocked-word validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/rooms/created:
    get:
      operationId: listMyCreatedRooms
      summary: List rooms created by current user
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Created rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
  /me/rooms/joined:
    get:
      operationId: listMyJoinedRooms
      summary: List rooms joined by current user
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Joined rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
  /me/stats:
    get:
      operationId: getMyStats
      summary: Get current user stats
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsResponse'
  /rooms:
    get:
      operationId: listRooms
      summary: List rooms
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: sport_type
          schema:
            type: string
        - in: query
          name: campus
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: time_range
          schema:
            type: string
        - in: query
          name: organization
          schema:
            type: string
        - in: query
          name: level
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createRoom
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}:
    get:
      operationId: getRoomById
      summary: Get room detail
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Room found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateRoom
      summary: Update room detail
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
      responses:
        '200':
          description: Updated room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/close:
    post:
      operationId: closeRoom
      summary: Close a room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Room closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/join-by-code:
    post:
      operationId: joinRoomByCode
      summary: Join a room by invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomByCodeRequest'
      responses:
        '200':
          description: Join result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRoomResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/join:
    post:
      operationId: joinRoomDirectly
      summary: Join a room directly
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRoomResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/apply:
    post:
      operationId: createJoinRequest
      summary: Create a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJoinRequestRequest'
      responses:
        '201':
          description: Join request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/approve:
    post:
      operationId: approveJoinRequest
      summary: Approve a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewJoinRequestRequest'
      responses:
        '200':
          description: Join request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reject:
    post:
      operationId: rejectJoinRequest
      summary: Reject a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewJoinRequestRequest'
      responses:
        '200':
          description: Join request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/invite:
    post:
      operationId: inviteRoomMember
      summary: Invite a member into room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '200':
          description: Invite result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberActionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/members/{userId}/remove:
    post:
      operationId: removeRoomMember
      summary: Remove a member from room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
        - $ref: '#/components/parameters/MemberUserIdPath'
      responses:
        '200':
          description: Remove result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberActionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations/venues:
    get:
      operationId: listReservationVenues
      summary: List supported reservation venues
      parameters:
        - in: query
          name: sport_type
          schema:
            type: string
        - in: query
          name: campus
          schema:
            type: string
      responses:
        '200':
          description: Venue list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationVenueListResponse'
  /reservations/slots:
    get:
      operationId: listReservationSlots
      summary: List supported reservation slots
      parameters:
        - in: query
          name: sport_type
          required: true
          schema:
            type: string
        - in: query
          name: campus_name
          required: true
          schema:
            type: string
        - in: query
          name: venue_name
          required: true
          schema:
            type: string
        - in: query
          name: reservation_date
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Reservation slot list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSlotListResponse'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reservation/preview:
    post:
      operationId: previewRoomReservation
      summary: Preview reservation for a room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationSubmitRequest'
      responses:
        '200':
          description: Reservation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationPreviewResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reservation/submit:
    post:
      operationId: submitRoomReservation
      summary: Submit reservation for a room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationSubmitRequest'
      responses:
        '200':
          description: Reservation submit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationRecordResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    UserIdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    RoomIdPath:
      in: path
      name: roomId
      required: true
      schema:
        type: string
        format: uuid
    MemberUserIdPath:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    PageQuery:
      in: query
      name: page
      schema:
        type: integer
        format: int32
        minimum: 1
    PageSizeQuery:
      in: query
      name: page_size
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    ReadyResponse:
      type: object
      required: [database, status]
      properties:
        database:
          type: string
        status:
          type: string
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    CreateUserRequest:
      type: object
      required: [auth_uid]
      properties:
        auth_uid:
          type: string
          minLength: 1
          maxLength: 64
    WxLoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 128
        auth_uid:
          type: string
          minLength: 1
          maxLength: 64
    UpdateProfileRequest:
      type: object
      description: Update current user profile. Nickname and bio must pass synchronous blocked-word validation before persistence.
      properties:
        nickname:
          type: string
          maxLength: 30
        avatar_url:
          type: string
          maxLength: 255
        gender:
          type: string
          maxLength: 16
        bio:
          type: string
          maxLength: 255
    User:
      type: object
      required:
        - id
        - public_id
        - auth_uid
        - nickname
        - avatar_url
        - gender
        - bio
        - profile_status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        auth_uid:
          type: string
        nickname:
          type: string
        avatar_url:
          type: string
        gender:
          type: string
        bio:
          type: string
        profile_status:
          type: string
          description: Current profile state. This version uses synchronous blocked-word validation instead of manual review workflow.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserResponse:
      $ref: '#/components/schemas/User'
    UserStatsResponse:
      type: object
      required: [created_room_count, joined_room_count, pending_join_request_count]
      properties:
        created_room_count:
          type: integer
          format: int64
        joined_room_count:
          type: integer
          format: int64
        pending_join_request_count:
          type: integer
          format: int64
    RoomOwner:
      type: object
      required: [id, public_id, nickname, avatar_url]
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
    RoomMember:
      type: object
      required: [user_id, user_public_id, nickname, avatar_url, role, status]
      properties:
        user_id:
          type: integer
          format: int64
        user_public_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
        role:
          type: string
        status:
          type: string
    RoomCard:
      type: object
      required:
        - id
        - public_id
        - name
        - sport_type
        - campus_name
        - venue_name
        - start_time
        - end_time
        - owner_nickname
        - owner_avatar_url
        - current_member_count
        - max_member_count
        - join_mode
        - visibility
        - status
        - reservation_status
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        name:
          type: string
        sport_type:
          type: string
        campus_name:
          type: string
        venue_name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        owner_nickname:
          type: string
        owner_avatar_url:
          type: string
        current_member_count:
          type: integer
          format: int32
        max_member_count:
          type: integer
          format: int32
        join_mode:
          type: string
        visibility:
          type: string
        status:
          type: string
        reservation_status:
          type: string
    RoomCardPage:
      type: object
      required: [page, page_size, total, items]
      properties:
        page:
          type: integer
          format: int32
        page_size:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoomCard'
    RoomDetail:
      type: object
      required:
        - id
        - public_id
        - name
        - sport_type
        - campus_name
        - venue_name
        - visibility
        - join_mode
        - status
        - reservation_status
        - need_reservation
        - start_time
        - end_time
        - owner
        - members
        - current_member_count
        - is_owner
        - joinable
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        name:
          type: string
        sport_type:
          type: string
        campus_name:
          type: string
        venue_name:
          type: string
        visibility:
          type: string
        join_mode:
          type: string
        status:
          type: string
        reservation_status:
          type: string
        reservation_provider:
          type: string
        need_reservation:
          type: boolean
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        gender_rule:
          type: string
        member_limit:
          type: integer
          format: int32
        organization:
          type: string
        level_desc:
          type: string
        description:
          type: string
        buddy_code:
          type: string
        owner:
          $ref: '#/components/schemas/RoomOwner'
        members:
          type: array
          items:
            $ref: '#/components/schemas/RoomMember'
        current_member_count:
          type: integer
          format: int32
        is_owner:
          type: boolean
        joinable:
          type: boolean
    CreateRoomRequest:
      type: object
      required:
        - name
        - sport_type
        - campus_name
        - venue_name
        - visibility
        - join_mode
        - start_time
        - end_time
      properties:
        name:
          type: string
          maxLength: 32
        sport_type:
          type: string
          maxLength: 32
        campus_name:
          type: string
          maxLength: 64
        venue_name:
          type: string
          maxLength: 128
        visibility:
          type: string
        join_mode:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        need_reservation:
          type: boolean
        gender_rule:
          type: string
        member_limit:
          type: integer
          format: int32
        organization:
          type: string
          maxLength: 64
        level_desc:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 500
    UpdateRoomRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 32
        visibility:
          type: string
        join_mode:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        need_reservation:
          type: boolean
        gender_rule:
          type: string
        member_limit:
          type: integer
          format: int32
        organization:
          type: string
          maxLength: 64
        level_desc:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 500
    JoinRoomByCodeRequest:
      type: object
      required: [buddy_code]
      properties:
        buddy_code:
          type: string
          minLength: 1
          maxLength: 16
    JoinRoomResult:
      type: object
      required: [room_id, room_public_id, join_result]
      properties:
        room_id:
          type: integer
          format: int64
        room_public_id:
          type: string
          format: uuid
        join_result:
          type: string
        member_status:
          type: string
        request_status:
          type: string
    CreateJoinRequestRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 255
    ReviewJoinRequestRequest:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: integer
          format: int64
          minimum: 1
    JoinRequestResponse:
      type: object
      required: [request_id, status]
      properties:
        request_id:
          type: integer
          format: int64
        status:
          type: string
    InviteMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          format: int64
          minimum: 1
    MemberActionResponse:
      type: object
      required: [room_id, user_id, status]
      properties:
        room_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          type: string
    ReservationVenue:
      type: object
      required: [sport_type, campus_name, venue_name]
      properties:
        sport_type:
          type: string
        campus_name:
          type: string
        venue_name:
          type: string
    ReservationVenueListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReservationVenue'
    ReservationSlot:
      type: object
      required: [slot_key, start_time, end_time, available]
      properties:
        slot_key:
          type: string
        start_time:
          type: string
        end_time:
          type: string
        available:
          type: boolean
        space_name:
          type: string
    ReservationSlotListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
