openapi: 3.0.3
info:
  title: SRTP Backend API
  version: 0.2.0
servers:
  - url: /
paths:
  /auth/wx/login:
    post:
      operationId: loginWithWechat
      summary: Login with wx.login code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WxLoginRequest'
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      operationId: logoutCurrentUser
      summary: Logout current user
      responses:
        '204':
          description: Logged out
  /healthz:
    get:
      operationId: getHealthz
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      operationId: getReadyz
      summary: Service readiness check
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: createUser
      summary: Create a user record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get a user by id
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/profile:
    put:
      operationId: updateCurrentUserProfile
      summary: Update current user profile with synchronous blocked-word validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/rooms/created:
    get:
      operationId: listMyCreatedRooms
      summary: List rooms created by current user
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Created rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
  /me/rooms/joined:
    get:
      operationId: listMyJoinedRooms
      summary: List rooms joined by current user
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Joined rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
  /me/stats:
    get:
      operationId: getMyStats
      summary: Get current user stats
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsResponse'
  /rooms:
    get:
      operationId: listRooms
      summary: List rooms
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: sport_type
          schema:
            type: string
        - in: query
          name: campus
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: time_range
          schema:
            type: string
        - in: query
          name: organization
          schema:
            type: string
        - in: query
          name: level
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCardPage'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createRoom
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}:
    get:
      operationId: getRoomById
      summary: Get room detail
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Room found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateRoom
      summary: Update room detail
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
      responses:
        '200':
          description: Updated room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/close:
    post:
      operationId: closeRoom
      summary: Close a room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Room closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/join-by-code:
    post:
      operationId: joinRoomByCode
      summary: Join a room by invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomByCodeRequest'
      responses:
        '200':
          description: Join result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRoomResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/join:
    post:
      operationId: joinRoomDirectly
      summary: Join a room directly
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      responses:
        '200':
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRoomResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/apply:
    post:
      operationId: createJoinRequest
      summary: Create a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJoinRequestRequest'
      responses:
        '201':
          description: Join request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/approve:
    post:
      operationId: approveJoinRequest
      summary: Approve a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewJoinRequestRequest'
      responses:
        '200':
          description: Join request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reject:
    post:
      operationId: rejectJoinRequest
      summary: Reject a join request
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewJoinRequestRequest'
      responses:
        '200':
          description: Join request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/invite:
    post:
      operationId: inviteRoomMember
      summary: Invite a member into room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '200':
          description: Invite result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberActionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/members/{userId}/remove:
    post:
      operationId: removeRoomMember
      summary: Remove a member from room
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
        - $ref: '#/components/parameters/MemberUserIdPath'
      responses:
        '200':
          description: Remove result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberActionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations/venues:
    get:
      operationId: listReservationVenues
      summary: List supported reservation venues
      description: |
        返回所有可预约的场馆列表，支持按球类(sport_type)和校区(campus)筛选。
        可选值来自 TYYS 体育馆系统：
        - **sport_type** 可选值：羽毛球、健身、游泳、网球
        - **campus** 可选值：紫金港校区、华家池校区、玉泉校区、西溪校区
        示例：sport_type=羽毛球&campus=紫金港 返回紫金港校区所有羽毛球场馆
      parameters:
        - in: query
          name: sport_type
          description: 球类类型，如羽毛球、健身、游泳、网球
          schema:
            type: string
        - in: query
          name: campus
          description: 校区名称，如紫金港校区、华家池校区、玉泉校区、西溪校区
          schema:
            type: string
      responses:
        '200':
          description: Venue list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationVenueListResponse'
  /reservations/slots:
    get:
      operationId: listReservationSlots
      summary: List available time slots for a venue
      description: |
        查询指定场馆在某日期的可预约时间段。
        - **sport_type** 可选值：羽毛球、健身、游泳、网球
        - **campus_name** 可选值：紫金港校区、华家池校区、玉泉校区、西溪校区
        - **venue_name** 可选值（按校区和球类不同）：如风雨操场、体育馆、羽毛球馆、游泳馆等
        - **reservation_date** 格式：YYYY-MM-DD，如 2026-04-21
      parameters:
        - in: query
          name: sport_type
          description: 球类类型。可选值：羽毛球、健身、游泳、网球
          required: true
          schema:
            type: string
            example: 羽毛球
        - in: query
          name: campus_name
          description: 校区名称。可选值：紫金港校区、华家池校区、玉泉校区、西溪校区
          required: true
          schema:
            type: string
            example: 紫金港校区
        - in: query
          name: venue_name
          description: 场馆名称
          required: true
          schema:
            type: string
            example: 风雨操场
        - in: query
          name: reservation_date
          description: 预约日期，格式 YYYY-MM-DD
          required: true
          schema:
            type: string
            format: date
            example: "2026-04-21"
      responses:
        '200':
          description: Reservation slot list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSlotListResponse'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reservation/preview:
    post:
      operationId: previewRoomReservation
      summary: Preview reservation for a room
      parameters:
        - $ref: '#/components/parameters/RoomPublicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationSubmitRequest'
      responses:
        '200':
          description: Reservation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationPreviewResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reservation/submit:
    post:
      operationId: submitRoomReservation
      summary: Submit reservation for a room
      parameters:
        - $ref: '#/components/parameters/RoomPublicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationSubmitRequest'
      responses:
        '200':
          description: Reservation submit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSubmitResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations/templates:
    get:
      operationId: listReservationTemplates
      summary: List venue template (static structure)
      description: |
        查询场馆的固定结构信息（分场列表、固定时间段模板）。
        不依赖 TYYS 实时查询窗口，适合在创建远期预约计划前让用户选择时间段。
      parameters:
        - in: query
          name: sport_type
          required: true
          schema:
            type: string
        - in: query
          name: campus_name
          required: true
          schema:
            type: string
        - in: query
          name: venue_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Venue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationTemplateResponse'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/{roomId}/reservation/plan:
    post:
      operationId: createRoomReservationPlan
      summary: Create a reservation plan for a future date (>2 days)
      description: |
        为 2 天后的日期创建预约计划，保存预约意图到数据库。
        系统会在预约日期前 2 天的相应时间 自动补全 slot 上下文并提交 TYYS。
      parameters:
        - $ref: '#/components/parameters/RoomPublicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationPlanRequest'
      responses:
        '200':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationRecordResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/tasks/reservation-materialize:
    post:
      operationId: triggerReservationMaterialize
      summary: Materialize scheduled reservation plans (internal scheduler use)
      description: |
        供调度器调用。将指定日期的 scheduled 计划补全为可执行的 slot 上下文，然后触发提交。
        每天 09:00 由调度器对"两天后"的计划执行一次。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationMaterializeRequest'
      responses:
        '200':
          description: Materialize result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationMaterializeResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/tasks/reservation-trigger:
    post:
      operationId: triggerReservation
      summary: Trigger a specific reservation submission (internal scheduler use)
      description: |
        供调度器调用。原子地将预约状态从 pending 切换到 submitting 并提交 TYYS。
        包含验证码失败重试（最多 5 次）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationTriggerRequest'
      responses:
        '200':
          description: Trigger result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationRecordResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    UserIdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    RoomIdPath:
      in: path
      name: roomId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    RoomPublicIdPath:
      in: path
      name: roomId
      required: true
      schema:
        type: string
        format: uuid
    MemberUserIdPath:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    PageQuery:
      in: query
      name: page
      schema:
        type: integer
        format: int32
        minimum: 1
    PageSizeQuery:
      in: query
      name: page_size
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    ReadyResponse:
      type: object
      required: [database, status]
      properties:
        database:
          type: string
        status:
          type: string
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    CreateUserRequest:
      type: object
      required: [auth_uid]
      properties:
        auth_uid:
          type: string
          minLength: 1
          maxLength: 64
    WxLoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 128
        auth_uid:
          type: string
          minLength: 1
          maxLength: 64
    UpdateProfileRequest:
      type: object
      description: Update current user profile. Nickname and bio must pass synchronous blocked-word validation before persistence.
      properties:
        nickname:
          type: string
          maxLength: 30
        avatar_url:
          type: string
          maxLength: 255
        gender:
          type: string
          maxLength: 16
        bio:
          type: string
          maxLength: 255
    User:
      type: object
      required:
        - id
        - public_id
        - auth_uid
        - nickname
        - avatar_url
        - gender
        - bio
        - profile_status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        auth_uid:
          type: string
        nickname:
          type: string
        avatar_url:
          type: string
        gender:
          type: string
        bio:
          type: string
        profile_status:
          type: string
          description: Current profile state. This version uses synchronous blocked-word validation instead of manual review workflow.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserResponse:
      $ref: '#/components/schemas/User'
    UserStatsResponse:
      type: object
      required: [created_room_count, joined_room_count, pending_join_request_count]
      properties:
        created_room_count:
          type: integer
          format: int64
        joined_room_count:
          type: integer
          format: int64
        pending_join_request_count:
          type: integer
          format: int64
    RoomOwner:
      type: object
      required: [id, public_id, nickname, avatar_url]
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
    RoomMember:
      type: object
      required: [user_id, user_public_id, nickname, avatar_url, role, status]
      properties:
        user_id:
          type: integer
          format: int64
        user_public_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
        role:
          type: string
        status:
          type: string
    RoomCard:
      type: object
      required:
        - id
        - public_id
        - name
        - sport_type
        - campus_name
        - venue_name
        - start_time
        - end_time
        - owner_nickname
        - owner_avatar_url
        - current_member_count
        - max_member_count
        - join_mode
        - visibility
        - status
        - reservation_status
      properties:
        id:
          type: integer
          format: int64
        public_id:
          type: string
          format: uuid
        name:
          type: string
        sport_type:
          type: string
        campus_name:
          type: string
        venue_name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        owner_nickname:
          type: string
        owner_avatar_url:
          type: string
        current_member_count:
          type: integer
          format: int32
        max_member_count:
          type: integer
          format: int32
        join_mode:
          type: string
        visibility:
          type: string
        status:
          type: string
        reservation_status:
          type: string
    RoomCardPage:
      type: object
