            $ref: '#/components/schemas/ReservationTemplateSlot'
    ReservationPlanSlotSelection:
      type: object
      required: [campus_name, venue_name, space_id, start_time, end_time]
      description: 计划路径首选场次，与 ReservationSlotSelection 相比不含需要 materialize 时才能确定的 time_id/token
      properties:
        campus_name:
          type: string
        venue_name:
          type: string
        venue_id:
          type: integer
          format: int64
        venue_site_id:
          type: integer
          format: int64
        space_id:
          type: integer
          format: int64
        space_name:
          type: string
        start_time:
          type: string
        end_time:
          type: string
    ReservationPlanRequest:
      type: object
      required:
        - sport_type
        - reservation_date
        - plan_slots
      description: 创建预约计划请求（仅保存预约意图，不立即调 TYYS）
      properties:
        sport_type:
          type: string
        reservation_date:
          type: string
          format: date
        buddy_code:
          type: string
        plan_slots:
          type: array
          items:
            $ref: '#/components/schemas/ReservationPlanSlotSelection'
          description: 选中场次列表，campus/venue/start/end 均在每个 slot 中携带；调度器依次尝试直到一个成功
    ReservationTriggerRequest:
      type: object
      required: [reservation_public_id]
      description: 触发单条预约提交（供调度器调用，使用 public_id 避免整数枚举越权风险）
      properties:
        reservation_public_id:
          type: string
          format: uuid
    ReservationMaterializeRequest:
      type: object
      description: |
        触发预约计划补全（供调度器调用）。
        后端自动查找 reserve_open_at <= now 且 status = scheduled 的记录，无需传入日期。
      properties:
        dry_run:
          type: boolean
          description: 若为 true，只返回待处理计划数量，不实际执行
    ReservationMaterializeResult:
      type: object
      required: [total, succeeded, failed, expired]
      description: 预约计划批量补全结果，返回本次调度处理的计划数量及失败详情
      properties:
        total:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        expired:
          type: integer
          description: 本次清理中标记为 expired 的过期失败预约数量
        errors:
          type: array
          items:
            type: string
